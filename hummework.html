<html>

<body>
    <h2>JavaScript Objects and its Properties</h2>
    <p>There are two different ways to access an object property.</p>
    <p>You can use .property or ["property"]</p>
    <p id="demo"></p>
    <script>
        var number = {
            firstNumber: "4",
            secondNumber: "5",
            thirdNumber: 50,
        }
        document.getElementById("demo")
            .innerHTML = number.firstNumber + " + " + number.thirdNumber + " = " + (parseInt(number.firstNumber) + parseInt(number.thirdNumber));
    </script>
</body>

</html>
